<article
  class="flex w-full max-w-sm flex-col overflow-hidden rounded-2xl bg-white shadow-md ring-1 ring-gray-200 transition-shadow hover:shadow-xl"
>
  <div class="relative h-48 w-full bg-gray-100">
    <img
      [ngSrc]="trainer().avatarUrl"
      [alt]="trainer().name + ' portrait'"
      fill
      class="object-cover"
    />
    <span
      class="absolute top-3 left-3 rounded-full bg-black/60 px-2 py-0.5 text-xs font-medium text-white"
    >
      #{{ trainer().id }}
    </span>
    <span
      class="absolute top-3 right-3 rounded-full px-2.5 py-1 text-xs font-semibold"
      [class]="levelBadgeClasses()"
    >
      {{ levelLabel() }}
    </span>
  </div>

  <div class="flex flex-1 flex-col gap-3 p-5">
    <div>
      <h2 class="text-xl font-bold text-gray-900">{{ trainer().name }}</h2>
      <p class="mt-0.5 flex items-center gap-1 text-sm text-gray-600">
        <svg
          class="size-4 shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path
            d="M12 21s-7-6.24-7-11a7 7 0 1 1 14 0c0 4.76-7 11-7 11Z"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="12" cy="10" r="2.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span>{{ trainer().hometown }}</span>
        <span aria-hidden="true">·</span>
        <span>{{ trainer().age }} ans</span>
      </p>
    </div>

    <p class="text-sm leading-relaxed text-gray-700">{{ trainer().description }}</p>

    <div class="mt-auto flex items-center gap-2 border-t border-gray-100 pt-3 text-sm text-gray-600">
      <svg
        class="size-4 shrink-0 text-amber-500"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          d="M12 2 9.2 8.6 2 9.2l5.5 4.7L5.8 21 12 17.3 18.2 21l-1.7-7.1L22 9.2l-7.2-.6L12 2Z"
        />
      </svg>
      <span>Pokémon préféré : <span class="font-medium text-gray-900">#{{ trainer().favoritePokemon }}</span></span>
    </div>
  </div>
</article>
