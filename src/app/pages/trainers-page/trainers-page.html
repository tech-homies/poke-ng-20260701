<h1>Trainers</h1>

@if (trainersResource.isLoading()) {
  is Loading...
} @else {
  <app-trainers-list [trainers]="trainersResource.value()" (trainerDeleted)="removeTrainer($event)" />
}

<div class="absolute right-6 bottom-6">
  <button type="button" matFab aria-label="Ajouter un dresseur" (click)="openAddTrainerDialog()">
    <mat-icon>add</mat-icon>
  </button>
</div>
